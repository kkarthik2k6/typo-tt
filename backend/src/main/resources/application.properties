server.port=${PORT:8080}
spring.application.name=typing-test-backend

# Database Configuration (NeonDB / PostgreSQL)
# These values are read from environment variables at deployment time.
# For local development, copy this file and fill in your credentials.
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# CORS (comma-separated origins for production)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
